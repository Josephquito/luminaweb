<!-- login.component.html -->
<div class="login-wrap">
  <div class="login-card">
    <h1 class="login-title">Iniciar sesión</h1>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="correo@ejemplo.com"
          autocomplete="email"
          [class.input-error]="email.invalid && email.touched"
        />
        @if (email.invalid && email.touched) {
          <span class="error-msg">Ingresa un correo válido</span>
        }
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <div class="input-password">
          <input
            id="password"
            [type]="mostrarPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
            [class.input-error]="password.invalid && password.touched"
          />
          <button type="button" class="toggle-pw" (click)="togglePassword()" tabindex="-1">
            @if (mostrarPassword) {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 4.411m0 0L21 21"
                />
              </svg>
            } @else {
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                />
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                />
              </svg>
            }
          </button>
        </div>
        @if (password.invalid && password.touched) {
          <span class="error-msg">La contraseña es requerida</span>
        }
      </div>

      @if (error) {
        <div class="alert-error">{{ error }}</div>
      }

      <button type="submit" class="btn-submit" [disabled]="cargando">
        @if (cargando) {
          <span class="spinner"></span>
          Ingresando...
        } @else {
          Ingresar
        }
      </button>
    </form>
  </div>
</div>
